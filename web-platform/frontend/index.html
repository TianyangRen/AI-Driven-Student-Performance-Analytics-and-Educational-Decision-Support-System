<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Student Performance Analytics</title>
    <script>
      // Apply saved theme/lang before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var m = localStorage.getItem('pref_theme_mode');
          document.documentElement.setAttribute('data-theme', m === 'light' ? 'light' : 'dark');
          var l = localStorage.getItem('pref_lang');
          if (l === 'fr' || l === 'en') document.documentElement.setAttribute('lang', l);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
